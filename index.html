<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>형아 뉴욕 7박8일 — Final</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --card-yellow:#F5B70A;   /* MetroCard yellow */
    --navy:#12234B;          /* MetroCard navy */
    --ink:#17181C;
    --paper:#F6F4EE;
    --white:#FFFFFF;
    --line:#E3DFD4;
    --sub:#6E6B62;
    --red:#D6402B;           /* subway red accent */
    --green:#128A4A;
    --radius:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Archivo',sans-serif;
    padding-bottom:80px;
  }

  /* ── HERO : MetroCard ── */
  .hero{
    margin:16px;
    background:var(--card-yellow);
    border-radius:20px;
    padding:26px 22px 22px;
    position:relative;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(18,35,75,.18);
  }
  .hero::after{
    content:'';
    position:absolute; right:0; top:0; bottom:0; width:20px;
    background:var(--ink);
  }
  .hero-top{
    display:flex; justify-content:space-between; align-items:flex-start; padding-right:24px;
  }
  .hero-eyebrow{
    font-size:11px; font-weight:800; letter-spacing:2.5px; color:var(--navy);
  }
  .hero h1{
    font-family:'Archivo Black',sans-serif;
    font-size:40px; line-height:.98; color:var(--navy);
    margin-top:10px; letter-spacing:-1px;
    padding-right:24px;
  }
  .hero-sub{
    margin-top:12px; font-size:13px; font-weight:600; color:var(--navy);
    opacity:.85; line-height:1.6; padding-right:24px;
  }
  .hero-row{
    display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; padding-right:24px;
  }
  .hero-chip{
    background:var(--navy); color:var(--card-yellow);
    font-size:11px; font-weight:700; letter-spacing:.5px;
    padding:6px 12px; border-radius:6px;
  }

  /* ── DAY NAV ── */
  .daynav{
    display:flex; gap:8px; overflow-x:auto; padding:8px 16px 12px;
    position:sticky; top:0; z-index:30;
    background:linear-gradient(var(--paper) 85%, transparent);
    -webkit-overflow-scrolling:touch;
  }
  .daynav::-webkit-scrollbar{display:none;}
  .dn-btn{
    flex-shrink:0; border:2px solid var(--ink); background:var(--white);
    border-radius:10px; padding:8px 12px; cursor:pointer;
    font-family:'Archivo',sans-serif; text-align:left; min-width:76px;
    transition:transform .12s, background .12s;
  }
  .dn-btn .d{font-family:'Archivo Black',sans-serif; font-size:16px; line-height:1;}
  .dn-btn .w{font-size:10px; font-weight:700; color:var(--sub); margin-top:3px; letter-spacing:.5px;}
  .dn-btn.active{background:var(--navy); border-color:var(--navy);}
  .dn-btn.active .d{color:var(--card-yellow);}
  .dn-btn.active .w{color:#B9C4DE;}
  .dn-btn:active{transform:scale(.96);}

  /* ── PANELS ── */
  .panel{display:none; padding:8px 16px 0; max-width:680px; margin:0 auto;}
  .panel.active{display:block; animation:up .35s ease;}
  @keyframes up{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

  .day-banner{
    display:flex; align-items:baseline; gap:10px; margin:10px 2px 4px;
  }
  .day-banner .big{
    font-family:'Archivo Black',sans-serif; font-size:30px; color:var(--navy); letter-spacing:-.5px;
  }
  .day-banner .date{font-size:12px; font-weight:700; color:var(--sub); letter-spacing:1px;}
  .day-note{
    margin:8px 2px 16px; font-size:12.5px; line-height:1.65; color:var(--sub); font-weight:500;
  }
  .day-note b{color:var(--red);}

  /* ── STOP CARD ── */
  .stop{
    background:var(--white);
    border:1.5px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:14px;
    box-shadow:0 2px 8px rgba(23,24,28,.05);
  }
  .strip{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px;
    height:104px; background:var(--line);
  }
  .slot{position:relative; overflow:hidden; background:#ECE9E0;}
  .slot::before{
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(45deg,#ECE9E0 0 8px,#E4E1D6 8px 16px);
  }
  .slot img{
    width:100%; height:104px; object-fit:cover; display:block;
    position:relative; z-index:1; opacity:0; transition:opacity .45s ease;
  }
  .slot img.on{opacity:1;}
  .stop-body{padding:13px 15px 15px;}
  .stop-head{display:flex; align-items:center; gap:9px;}
  .t-chip{
    flex-shrink:0;
    font-family:'Archivo Black',sans-serif;
    font-size:12px; letter-spacing:.5px;
    background:var(--card-yellow); color:var(--navy);
    padding:4px 9px; border-radius:6px;
    border:1.5px solid var(--navy);
  }
  .t-chip.hot{background:var(--red); color:#fff; border-color:var(--red);}
  .stop-title{font-size:16.5px; font-weight:800; letter-spacing:-.2px;}
  .stop-desc{
    margin-top:7px; font-size:13px; line-height:1.65; color:#3E3D38; font-weight:500;
  }
  .stop-foot{
    display:flex; align-items:center; justify-content:space-between; margin-top:11px;
  }
  .tags{display:flex; gap:5px; flex-wrap:wrap;}
  .tag{
    font-size:10.5px; font-weight:700; color:var(--sub);
    border:1px solid var(--line); padding:3px 8px; border-radius:20px; background:var(--paper);
  }
  .maplink{
    flex-shrink:0;
    font-size:12px; font-weight:800; color:var(--navy);
    text-decoration:none; display:inline-flex; align-items:center; gap:4px;
    border-bottom:2px solid var(--card-yellow); padding-bottom:1px;
  }

  /* ── MEALS ── */
  .meals{
    background:var(--navy); border-radius:var(--radius);
    padding:16px; margin:20px 0 8px; color:#EAEEF7;
  }
  .meals h4{
    font-family:'Archivo Black',sans-serif; font-size:13px; letter-spacing:2px;
    color:var(--card-yellow); margin-bottom:12px;
  }
  .meal{
    display:flex; gap:10px; padding:9px 0; border-top:1px solid rgba(255,255,255,.12);
    font-size:12.5px; line-height:1.6;
  }
  .meal:first-of-type{border-top:none; padding-top:0;}
  .meal .m-l{
    flex-shrink:0; width:38px; font-weight:800; color:var(--card-yellow); font-size:12px;
  }
  .meal .m-b{font-weight:500;}

  /* ── INFO PANEL ── */
  .icard{
    background:var(--white); border:1.5px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;
  }
  .icard h3{
    font-family:'Archivo Black',sans-serif; font-size:14px; color:var(--navy);
    margin-bottom:10px; letter-spacing:.5px;
  }
  .icard ul{padding-left:18px;}
  .icard li{font-size:13px; line-height:1.9; color:#3E3D38; font-weight:500;}
  .icard li b{color:var(--ink);}
  .icard a{color:var(--navy); font-weight:700; text-decoration:none; border-bottom:2px solid var(--card-yellow);}
  .btable{width:100%; border-collapse:collapse; font-size:13px;}
  .btable td{padding:8px 4px; border-bottom:1px solid var(--line); color:#3E3D38; font-weight:500;}
  .btable td:last-child{text-align:right; font-weight:800; color:var(--ink);}
  .btable tr.tt td{border-bottom:none; border-top:2.5px solid var(--navy); color:var(--navy); font-weight:900;}

  footer{text-align:center; padding:26px 16px 0; font-size:11px; color:#A7A398; font-weight:600;}
</style>
</head>

// ── image loading (3 per strip) ──
const cache = {};
function pickUrls(data){
  const arr = Array.isArray(data) ? data
    : data.images || data.urls || data.results || data.items || [];
  return arr.map(x => typeof x === 'string' ? x : (x.url || x.link || x.thumbnail)).filter(Boolean);
}
async function loadImages(panelId){
  const panel = document.getElementById(panelId);
  if(!panel) return;
  panel.querySelectorAll('.strip:not([data-done])').forEach(async strip => {
    strip.setAttribute('data-done','1');
    const q = strip.dataset.q;
    const imgs = strip.querySelectorAll('img');
    try{
      let urls = cache[q];
      if(!urls){
        const r = await fetch('https://seoul-random-date.vercel.app/api/images?query=' + encodeURIComponent(q));
        if(!r.ok) throw new Error('HTTP '+r.status);
        urls = pickUrls(await r.json());
        cache[q] = urls;
      }
      imgs.forEach((im,i)=>{
        if(urls[i]){
          im.src = urls[i];
          im.onload = ()=> im.classList.add('on');
          im.onerror = ()=>{ im.style.display='none'; };
        }
      });
      if(!urls.length) strip.style.display='none';
    }catch(e){
      console.warn('img fail:', q, e);
      strip.style.display='none';
    }
  });
}

function show(id){
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.dn-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelector(`.dn-btn[data-target="${id}"]`).classList.add('active');
  loadImages(id);
  window.scrollTo({top:0, behavior:'smooth'});
}
